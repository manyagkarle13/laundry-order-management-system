services:
  - type: web
    name: cleantrack-laundry
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn laundry_project.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false